<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f8f9fa',
                            100: '#f1f3f4',
                            800: '#1e1f20',
                            900: '#131314',
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        /* Markdown overrides for chat bubbles */
        .prose p:last-child { margin-bottom: 0; }
        .prose pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        
        /* Prevent body scroll when mobile sidebar is open */
        body.sidebar-open { overflow: hidden; }
        
        /* Smooth fade */
        .fade-enter { opacity: 0; transition: opacity 0.3s ease-in-out; }
        .fade-enter-active { opacity: 1; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 antialiased h-[100dvh] overflow-hidden flex flex-col transition-colors duration-200">

    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gemini-900 z-[100] transition-opacity duration-300">
        <div class="flex flex-col items-center space-y-4">
            <svg class="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading App...</div>
        </div>
    </div>

    <div id="app" class="flex h-full w-full hidden relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity"></div>

        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-30 w-72 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-4 flex items-center justify-between">
                <button id="btn-new-chat" class="flex items-center space-x-2 bg-white dark:bg-gemini-900 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm font-medium py-3 px-4 rounded-full w-full shadow-sm border border-gray-200 dark:border-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>New Chat</span>
                </button>
                <button id="btn-close-sidebar" class="md:hidden p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-list">
                </div>
        </aside>

        <main class="flex-1 flex flex-col h-full relative min-w-0">
            <header class="flex-none h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gemini-900/80 backdrop-blur-md z-10">
                <div class="flex items-center space-x-3">
                    <button id="btn-open-sidebar" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-200 truncate" id="header-title">Universal AI</h1>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="btn-theme" class="p-2 text-gray-600 dark:text-gray-300 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle Theme">
                        <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <button id="btn-settings" class="p-2 text-gray-600 dark:text-gray-300 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Settings">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center px-4 fade-enter">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mb-6 flex items-center justify-center shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-2">How can I help you today?</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">Enter a prompt below to start a conversation. Make sure your OpenRouter API key is set in settings.</p>
                </div>
                
                </div>

            <div class="flex-none p-4 bg-white dark:bg-gemini-900 border-t border-transparent relative z-10 pb-6 sm:pb-4">
                <div class="max-w-4xl mx-auto relative flex items-end bg-gemini-100 dark:bg-gemini-800 rounded-3xl sm:rounded-[2rem] p-2 pr-12 shadow-sm border border-gray-200 dark:border-gray-700 transition-colors focus-within:ring-2 focus-within:ring-blue-500/50">
                    <textarea id="message-input" rows="1" class="w-full max-h-48 py-3 px-4 bg-transparent border-none focus:ring-0 resize-none text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 overflow-y-auto custom-scrollbar" placeholder="Ask anything..."></textarea>
                    
                    <button id="btn-send" disabled class="absolute right-3 bottom-2.5 p-2 rounded-full text-white bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:cursor-not-allowed transition-colors">
                        <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                    AI can make mistakes. Check important info.
                </div>
            </div>
        </main>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white dark:bg-gemini-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90dvh]">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Settings</h3>
                <button id="btn-close-settings" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-5 space-y-5 overflow-y-auto flex-1">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="input-api-key" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-v1-...">
                    <p class="text-xs text-gray-500 mt-1">Stored locally in your browser.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name</label>
                    <input type="text" id="input-model" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System Prompt (Global)</label>
                    <textarea id="input-system-prompt" rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                <button id="btn-save-settings" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors shadow-sm">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // STATE MANAGEMENT
            // ==========================================
            const defaultSettings = {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful AI assistant.',
                theme: 'light'
            };

            let state = {
                settings: JSON.parse(localStorage.getItem('uni_settings')) || defaultSettings,
                chats: JSON.parse(localStorage.getItem('uni_chats')) || [],
                currentChatId: localStorage.getItem('uni_currentChatId') || null,
                isGenerating: false,
                abortController: null
            };

            // DOM Elements Cache
            const dom = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                chatContainer: document.getElementById('chat-container'),
                chatList: document.getElementById('chat-list'),
                welcomeScreen: document.getElementById('welcome-screen'),
                messageInput: document.getElementById('message-input'),
                btnSend: document.getElementById('btn-send'),
                btnNewChat: document.getElementById('btn-new-chat'),
                btnOpenSidebar: document.getElementById('btn-open-sidebar'),
                btnCloseSidebar: document.getElementById('btn-close-sidebar'),
                btnTheme: document.getElementById('btn-theme'),
                btnSettings: document.getElementById('btn-settings'),
                headerTitle: document.getElementById('header-title'),
                
                // Modal
                modalSettings: document.getElementById('modal-settings'),
                btnCloseSettings: document.getElementById('btn-close-settings'),
                btnSaveSettings: document.getElementById('btn-save-settings'),
                inputApiKey: document.getElementById('input-api-key'),
                inputModel: document.getElementById('input-model'),
                inputSystemPrompt: document.getElementById('input-system-prompt'),
            };

            // ==========================================
            // INITIALIZATION
            // ==========================================
            function init() {
                // Apply theme immediately
                applyTheme(state.settings.theme);

                // Setup marked.js options
                if (window.marked) {
                    marked.setOptions({
                        breaks: true,
                        gfm: true,
                        headerIds: false
                    });
                }

                // Ensure a current chat exists if chats are present
                if (state.chats.length > 0 && !state.currentChatId) {
                    state.currentChatId = state.chats[0].id;
                }

                // Bind Event Listeners
                bindEvents();

                // Render UI
                renderChatList();
                renderCurrentChat();

                // Hide loader, show app
                setTimeout(() => {
                    dom.loading.style.opacity = '0';
                    setTimeout(() => {
                        dom.loading.style.display = 'none';
                        dom.app.classList.remove('hidden');
                        dom.welcomeScreen.classList.add('fade-enter-active');
                    }, 300);
                }, 100);
            }

            // ==========================================
            // CORE LOGIC & RENDERING
            // ==========================================
            function saveState() {
                localStorage.setItem('uni_settings', JSON.stringify(state.settings));
                localStorage.setItem('uni_chats', JSON.stringify(state.chats));
                if (state.currentChatId) {
                    localStorage.setItem('uni_currentChatId', state.currentChatId);
                } else {
                    localStorage.removeItem('uni_currentChatId');
                }
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }

            function toggleTheme() {
                state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
                applyTheme(state.settings.theme);
                saveState();
            }

            function createNewChat() {
                if (state.isGenerating) return;
                const newChat = {
                    id: Date.now().toString(),
                    title: 'New Conversation',
                    messages: [],
                    updatedAt: Date.now()
                };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
                saveState();
                renderChatList();
                renderCurrentChat();
                closeSidebarMobile();
                dom.messageInput.focus();
            }

            function deleteChat(id, event) {
                event.stopPropagation();
                if (state.isGenerating) return;
                if (!confirm("Are you sure you want to delete this chat?")) return;

                state.chats = state.chats.filter(c => c.id !== id);
                if (state.currentChatId === id) {
                    state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                }
                saveState();
                renderChatList();
                renderCurrentChat();
            }

            function switchChat(id) {
                if (state.isGenerating || state.currentChatId === id) return;
                state.currentChatId = id;
                saveState();
                renderChatList();
                renderCurrentChat();
                closeSidebarMobile();
            }

            function renderChatList() {
                dom.chatList.innerHTML = '';
                if (state.chats.length === 0) {
                    dom.chatList.innerHTML = '<div class="text-sm text-gray-400 p-2 text-center">No history yet</div>';
                    return;
                }

                state.chats.forEach(chat => {
                    const isActive = chat.id === state.currentChatId;
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-50 dark:bg-gray-800 text-blue-600 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/50'}`;
                    div.onclick = () => switchChat(chat.id);
                    
                    div.innerHTML = `
                        <div class="flex items-center space-x-3 overflow-hidden">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            <span class="truncate text-sm font-medium">${escapeHTML(chat.title)}</span>
                        </div>
                        <button class="delete-btn opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 transition-opacity" title="Delete Chat">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    `;
                    
                    div.querySelector('.delete-btn').onclick = (e) => deleteChat(chat.id, e);
                    dom.chatList.appendChild(div);
                });
            }

            function renderCurrentChat() {
                // Clear active messages except welcome screen
                Array.from(dom.chatContainer.children).forEach(child => {
                    if (child.id !== 'welcome-screen') {
                        child.remove();
                    }
                });

                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                
                if (!currentChat || currentChat.messages.length === 0) {
                    dom.welcomeScreen.style.display = 'flex';
                    dom.headerTitle.textContent = 'Universal AI';
                    return;
                }

                dom.welcomeScreen.style.display = 'none';
                dom.headerTitle.textContent = currentChat.title;

                currentChat.messages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
                scrollToBottom();
            }

            function appendMessageUI(role, content, animate = false) {
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
                
                const bubble = document.createElement('div');
                bubble.className = `max-w-[85%] sm:max-w-[75%] rounded-2xl p-4 sm:p-5 text-[15px] leading-relaxed shadow-sm `;
                
                if (role === 'user') {
                    bubble.className += 'bg-blue-50 dark:bg-gemini-800 text-gray-800 dark:text-gray-100 rounded-br-sm';
                    bubble.textContent = content; // User text is raw
                } else {
                    bubble.className += 'bg-white dark:bg-transparent border border-gray-100 dark:border-none text-gray-800 dark:text-gray-100 rounded-bl-sm prose prose-sm sm:prose-base prose-slate dark:prose-invert max-w-none w-full';
                    bubble.innerHTML = window.marked ? marked.parse(content || '') : escapeHTML(content);
                }

                if (animate) {
                    wrapper.classList.add('fade-enter');
                    setTimeout(() => wrapper.classList.add('fade-enter-active'), 10);
                }

                wrapper.appendChild(bubble);
                dom.chatContainer.appendChild(wrapper);
                scrollToBottom();
                return bubble; // Return element for streaming updates
            }

            function scrollToBottom() {
                dom.chatContainer.scrollTop = dom.chatContainer.scrollHeight;
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }

            // ==========================================
            // API COMMUNICATION & STREAMING
            // ==========================================
            async function handleSend() {
                const content = dom.messageInput.value.trim();
                if (!content || state.isGenerating) return;

                if (!state.settings.apiKey) {
                    alert('Please set your OpenRouter API Key in Settings first.');
                    openSettings();
                    return;
                }

                // If no chat exists, create one
                if (!state.currentChatId || state.chats.length === 0) {
                    createNewChat();
                }

                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                
                // Add User Message
                currentChat.messages.push({ role: 'user', content });
                currentChat.updatedAt = Date.now();
                
                // Generate title if it's the first message
                if (currentChat.messages.length === 1) {
                    currentChat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                }
                
                saveState();
                
                // UI Updates
                dom.messageInput.value = '';
                dom.messageInput.style.height = 'auto'; // Reset height
                updateInputState();
                dom.welcomeScreen.style.display = 'none';
                dom.headerTitle.textContent = currentChat.title;
                renderChatList(); // Update sidebar title
                
                appendMessageUI('user', content, true);
                
                // Prepare AI Response Bubble
                const aiBubbleElement = appendMessageUI('assistant', '<span class="animate-pulse">Typing...</span>', true);
                
                // API Call preparation
                state.isGenerating = true;
                updateInputState();
                state.abortController = new AbortController();

                const apiMessages = [
                    { role: 'system', content: state.settings.systemPrompt },
                    ...currentChat.messages.map(m => ({ role: m.role, content: m.content }))
                ];

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'HTTP-Referer': window.location.href, // Required by OpenRouter
                            'X-Title': 'Universal AI Local Chat' // Required by OpenRouter
                        },
                        body: JSON.stringify({
                            model: state.settings.model,
                            messages: apiMessages,
                            stream: true
                        }),
                        signal: state.abortController.signal
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let aiFullResponse = '';
                    let isFirstChunk = true;

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    const delta = data.choices[0]?.delta?.content;
                                    if (delta) {
                                        aiFullResponse += delta;
                                        if(isFirstChunk) { aiBubbleElement.innerHTML = ''; isFirstChunk = false; }
                                        // Use marked to render the accumulating markdown
                                        aiBubbleElement.innerHTML = window.marked ? marked.parse(aiFullResponse) : escapeHTML(aiFullResponse);
                                        // Auto scroll down as text appears if we are already near bottom
                                        if (dom.chatContainer.scrollHeight - dom.chatContainer.scrollTop < 600) {
                                            scrollToBottom();
                                        }
                                    }
                                } catch (e) {
                                    // Silently ignore incomplete JSON chunks
                                }
                            }
                        }
                    }

                    // Save final message
                    currentChat.messages.push({ role: 'assistant', content: aiFullResponse });
                    currentChat.updatedAt = Date.now();
                    saveState();

                } catch (error) {
                    if (error.name === 'AbortError') {
                        aiBubbleElement.innerHTML = '<span class="text-yellow-600 dark:text-yellow-400">Response stopped.</span>';
                    } else {
                        console.error('API Error:', error);
                        aiBubbleElement.innerHTML = `<span class="text-red-500 font-medium">Error: ${escapeHTML(error.message)}</span>`;
                    }
                } finally {
                    state.isGenerating = false;
                    state.abortController = null;
                    updateInputState();
                    dom.messageInput.focus();
                }
            }

            // ==========================================
            // UI INTERACTIONS
            // ==========================================
            function updateInputState() {
                const hasText = dom.messageInput.value.trim().length > 0;
                dom.btnSend.disabled = !hasText || state.isGenerating;
                if (state.isGenerating) {
                    // Turn send button into stop button visually
                    dom.btnSend.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>';
                    dom.btnSend.classList.replace('bg-blue-500', 'bg-red-500');
                    dom.btnSend.classList.replace('hover:bg-blue-600', 'hover:bg-red-600');
                    dom.btnSend.disabled = false; // Enable to allow aborting
                } else {
                    dom.btnSend.innerHTML = '<svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>';
                    dom.btnSend.classList.replace('bg-red-500', 'bg-blue-500');
                    dom.btnSend.classList.replace('hover:bg-red-600', 'hover:bg-blue-600');
                }
            }

            function openSidebarMobile() {
                dom.sidebar.classList.remove('-translate-x-full');
                dom.sidebarOverlay.classList.remove('hidden');
                document.body.classList.add('sidebar-open');
            }

            function closeSidebarMobile() {
                dom.sidebar.classList.add('-translate-x-full');
                dom.sidebarOverlay.classList.add('hidden');
                document.body.classList.remove('sidebar-open');
            }

            function openSettings() {
                dom.inputApiKey.value = state.settings.apiKey;
                dom.inputModel.value = state.settings.model;
                dom.inputSystemPrompt.value = state.settings.systemPrompt;
                dom.modalSettings.classList.remove('hidden');
            }

            function closeSettings() {
                dom.modalSettings.classList.add('hidden');
            }

            function saveSettings() {
                state.settings.apiKey = dom.inputApiKey.value.trim();
                state.settings.model = dom.inputModel.value.trim() || 'deepseek/deepseek-r1:free';
                state.settings.systemPrompt = dom.inputSystemPrompt.value.trim() || 'You are a helpful AI assistant.';
                saveState();
                closeSettings();
            }

            // ==========================================
            // EVENT BINDINGS
            // ==========================================
            function bindEvents() {
                // Input auto-resize
                dom.messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                    updateInputState();
                });

                // Keyboard handling for textarea
                dom.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!dom.btnSend.disabled) handleSend();
                    }
                });

                // Send/Stop Button
                dom.btnSend.addEventListener('click', () => {
                    if (state.isGenerating && state.abortController) {
                        state.abortController.abort();
                    } else {
                        handleSend();
                    }
                });

                // Sidebar & Navigation
                dom.btnNewChat.addEventListener('click', createNewChat);
                dom.btnOpenSidebar.addEventListener('click', openSidebarMobile);
                dom.btnCloseSidebar.addEventListener('click', closeSidebarMobile);
                dom.sidebarOverlay.addEventListener('click', closeSidebarMobile);

                // Theme & Settings
                dom.btnTheme.addEventListener('click', toggleTheme);
                dom.btnSettings.addEventListener('click', openSettings);
                dom.btnCloseSettings.addEventListener('click', closeSettings);
                dom.btnSaveSettings.addEventListener('click', saveSettings);
                
                // Close settings on outside click
                dom.modalSettings.addEventListener('click', (e) => {
                    if (e.target === dom.modalSettings) closeSettings();
                });
            }

            // Run app
            init();
        });
    </script>
</body>
</html>
